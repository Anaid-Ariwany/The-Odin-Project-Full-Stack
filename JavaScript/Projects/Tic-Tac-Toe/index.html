<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
</head>

<body>
    <div class="page">
        <header class="header">
            <div class="brand">
                <h1 class="brand__title">Tic Tac Toe</h1>
                <p class="brand__subtitle">Play locally with two players.</p>
            </div>
        </header>

        <main class="main">
            <section class="panel" aria-label="Game setup">
                <form class="setup" id="setup-form">
                    <div class="field">
                        <label class="field__label" for="player-one">Player 1 name</label>
                        <input class="field__input" id="player-one" name="playerOne" type="text" autocomplete="off"
                            placeholder="Player 1" maxlength="20" />
                        <p class="field__hint">Plays as <strong>X</strong>.</p>
                    </div>

                    <div class="field">
                        <label class="field__label" for="player-two">Player 2 name</label>
                        <input class="field__input" id="player-two" name="playerTwo" type="text" autocomplete="off"
                            placeholder="Player 2" maxlength="20" />
                        <p class="field__hint">Plays as <strong>O</strong>.</p>
                    </div>

                    <div class="actions">
                        <button class="btn btn--primary" type="submit" id="start-btn">
                            Start game
                        </button>
                        <button class="btn btn--ghost" type="button" id="restart-btn" disabled>
                            Restart
                        </button>
                    </div>
                </form>

                <div class="status" aria-live="polite" aria-atomic="true">
                    <p class="status__label">Status</p>
                    <p class="status__text" id="status-text">Enter names and start a game.</p>
                </div>
            </section>

            <section class="board-wrap" aria-label="Tic Tac Toe board">
                <div class="board" id="board" role="grid" aria-label="3 by 3 board"></div>
                <p class="board-hint" id="board-hint">
                    Click a square to place a mark. You can’t play in a taken square.
                </p>
            </section>
        </main>

        <footer class="footer">
            <p class="footer__text">Built by Anaid Ariwany.</p>
        </footer>
    </div>
</body>

</html>
