<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Up Form</title>

    <!-- custom css -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>

        <!-- left section -->
        <section class="leftSection">
            <div class="logoDiv">
                <img src="assets/odin-lined-logo.webp" alt="odin-lined logo">
            </div>
        </section>

        <!-- right section -->
        <section>
            <div>
                <p>This is not a real online service! You know you need something like this in your life to help you
                    realize your deepest dreams.</p>
                <p>Sign up <em>now</em> to get started.</p>
                <p>You <em>know</em> you want to.</p>
            </div>

            <div>
                <form>
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" placeholder="Enter your first name" required>

                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" placeholder="Enter your last name" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email address" required>

                    <label for="phoneNumber">Phone Number</label>
                    <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="Enter your phone number"
                        required>

                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>

                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword"
                        placeholder="Confirm your password" required>

                </form>
            </div>

            <div>
                <button type="submit">Sign Up</button>
                <p>Already have an account? <a href="#">Log in</a></p>
            </div>
        </section>
    </main>
</body>

</html>
