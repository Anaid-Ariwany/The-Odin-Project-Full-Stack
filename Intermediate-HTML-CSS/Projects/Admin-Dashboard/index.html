<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <!-- roboto font -->
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css?family=roboto:400,600" rel="stylesheet" />

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- link css -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main>

        <!-- sidebar -->
        <section>

            <!-- logo div -->
            <div>
                <h1>
                    <span class="badge"><img src="assets/dashboard.svg" alt="dashboard" class="sidebarLogoIcon"></span>
                    Dashboard
                </h1>
            </div>

            <!-- navigation div -->
            <div>
                <ul>
                    <li>
                        <span class="badge"><img src="assets/home.svg" alt="home" class="sidebarIcon"></span> Home
                    </li>

                    <li>
                        <span class="badge"><img src="assets/profile-account.svg" alt="profile"
                                class="sidebarIcon"></span>
                        Analytics
                    </li>

                    <li>
                        <span class="badge"><img src="assets/message.svg" alt="message" class="sidebarIcon"></span>
                        Sales

                    </li>

                    <li>
                        <span class="badge"><img src="assets/history.svg" alt="history" class="sidebarIcon"></span>
                        Notifications
                    </li>

                    <li>
                        <span class="badge"><img src="assets/tasks.svg" alt="tasks" class="sidebarIcon"></span>
                        Settings
                    </li>

                    <li>
                        <span class="badge"><img src="assets/communities.svg" alt="communities"
                                class="sidebarIcon"></span>
                        Profile
                    </li>

                </ul>
            </div>

            <!-- support div -->
            <div>
                <ul>
                    <li>
                        <span class="badge"><img src="assets/settings.svg" alt="settings" class="sidebarIcon"></span>
                        Home
                    </li>

                    <li>
                        <span class="badge"><img src="assets/support.svg" alt="support" class="sidebarIcon"></span>
                        Analytics
                    </li>

                    <li>
                        <span class="badge"><img src="assets/privacy.svg" alt="privacy" class="sidebarIcon"></span>
                        Sales

                    </li>

                </ul>
            </div>

        </section>

        <!-- header -->
        <section></section>

        <!-- main content -->
        <section></section>

    </main>

    <!-- bootstrap js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
